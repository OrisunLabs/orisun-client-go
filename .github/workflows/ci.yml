name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          check-latest: true

      - name: Install dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -v ./... -tags=!integration

      - name: Build
        run: go build -v ./...
